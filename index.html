<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wizard Compressor</title>

    <link rel="stylesheet" href="index.css">

    <script src="index.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="overlay"></div>

<section id="page">

    <div class="logo">
        <i class="fas fa-hat-wizard"></i>
    </div>

    <h1 id="heading">
        Wizard File Compressor
    </h1>

    <p class="subtitle">
        Compress & Decompress Text Files using the Magic of Huffman Coding
    </p>

    <div class="bigdiv">

        <!-- STEP 1 -->

        <div class="align card" id="step1">

            <h2>
                <i class="fas fa-scroll"></i>
                Upload Your File
            </h2>

            <form
                method="post"
                enctype="multipart/form-data"
                id="fileform"
            >

                <label class="upload-box">

                    <i class="fas fa-cloud-upload-alt"></i>

                    <h3>Select Your Magical File</h3>

                    <p>Only .txt files are accepted</p>

                    <input
                        type="file"
                        id="uploadfile"
                        class="input"
                    >

                </label>

                <br>

                <input
                    type="button"
                    id="submitbtn"
                    class="normal"
                    value="Submit File"
                >

            </form>

        </div>

        <!-- STEP 2 -->

        <div class="align card" id="step2">

            <h2>
                <i class="fas fa-wand-sparkles"></i>
                Choose Your Spell
            </h2>

            <div class="button-group">

                <button
                    type="button"
                    id="encode"
                    class="button"
                >

                    <i class="fas fa-compress-alt"></i>

                    Compress

                </button>

                <button
                    type="button"
                    id="decode"
                    class="button"
                >

                    <i class="fas fa-expand-alt"></i>

                    Decompress

                </button>

            </div>

        </div>

        <!-- STEP 3 -->

        <div
            class="align card"
            id="step3"
        >

            <img
                src="./img/smilingharry.png"
                id="wizard"
                alt="Wizard"
            >

            <h2>Waiting for your spell...</h2>

        </div>

        <!-- RESET -->

        <div class="align card">

            <h2>

                <i class="fas fa-redo"></i>

                Start Again

            </h2>

            <button
                class="button"
                onclick="location.reload()"
            >

                Choose Another File

            </button>

        </div>

    </div>

</section>

</body>

</html>
